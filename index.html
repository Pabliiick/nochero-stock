<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Nochero</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a1a}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.container{max-width:980px;margin:0 auto;padding:1rem;padding-bottom:120px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:14px;font-family:inherit;transition:background .15s}
.btn:hover{background:#f3f4f6}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-green{background:#3B6D11;color:#fff;border-color:#3B6D11}
.btn-green:hover{background:#27500A}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-block{width:100%;justify-content:center}
label{font-size:13px;color:#6b7280;display:block;margin-top:10px;margin-bottom:3px}
input,select{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;font-size:14px;outline:none;transition:border .15s}
input:focus,select:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
.badge-mañana{background:#E6F1FB;color:#0C447C}
.badge-tarde{background:#FAEEDA;color:#633806}
.badge-noche{background:#EEEDFE;color:#3C3489}
.badge-admin{background:#EAF3DE;color:#27500A}
.badge-operador{background:#FEF3C7;color:#92400E}
.badge-ok{background:#EAF3DE;color:#27500A}
.badge-out{background:#FCEBEB;color:#A32D2D}
.badge-cerrado{background:#f3f4f6;color:#6b7280}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.alert-info{background:#E6F1FB;color:#0C447C}
.alert-success{background:#EAF3DE;color:#27500A}
.alert-danger{background:#FCEBEB;color:#A32D2D}
.alert-warning{background:#FAEEDA;color:#633806}
.tab-bar{display:flex;gap:4px;margin-bottom:1rem;background:#f3f4f6;border-radius:10px;padding:4px}
.tab{flex:1;padding:7px 4px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;border:none;background:transparent;color:#6b7280;transition:all .15s;font-family:inherit}
.tab.active{background:#fff;color:#1a1a1a;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid #e5e7eb}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
th{text-align:left;padding:10px 12px;color:#6b7280;border-bottom:1px solid #e5e7eb;font-weight:500;white-space:nowrap;background:#f9fafb}
td{padding:8px 12px;border-bottom:1px solid #f3f4f6;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding:1rem 1.25rem;background:#fff;border-radius:12px;border:1px solid #e5e7eb;flex-wrap:wrap;gap:10px}
.logo{font-size:18px;font-weight:600}
.logo span{color:#185FA5}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1rem}
.metric{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:.875rem;text-align:center}
.metric-val{font-size:20px;font-weight:600}
.metric-lbl{font-size:11px;color:#6b7280;margin-top:3px}
.login-wrap{max-width:380px;margin:3rem auto;padding:0 1rem}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px}
.search-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.search-row input{flex:1;margin:0}
.turno-bar{font-size:12px;color:#6b7280;display:flex;align-items:center;gap:6px}

/* COLUMNA AZUL - agregar venta */
th.col-venta{background:#185FA5;color:#fff;text-align:center;font-weight:700}
td.col-venta{background:#EBF4FF;text-align:center;padding:6px 8px}
.venta-wrap{display:flex;align-items:center;justify-content:center;gap:5px}
.venta-input{width:60px;padding:6px 5px;font-size:14px;font-weight:600;text-align:center;border:2px solid #185FA5;border-radius:8px;background:#fff;color:#185FA5;outline:none;font-family:inherit}
.venta-input:focus{box-shadow:0 0 0 3px rgba(24,95,165,.2)}
.venta-input.over{border-color:#A32D2D;color:#A32D2D;box-shadow:0 0 0 3px rgba(163,45,45,.15)}
.venta-input:disabled{background:#f3f4f6;border-color:#d1d5db;color:#9ca3af}
.btn-add{padding:5px 9px;background:#185FA5;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:3px;font-family:inherit}
.btn-add:hover{background:#0C447C}
.btn-add:disabled{background:#d1d5db;cursor:not-allowed}

/* COLUMNA VERDE - total turno editable */
th.col-total{background:#3B6D11;color:#fff;text-align:center;font-weight:700}
td.col-total{background:#f0fce8;text-align:center;padding:6px 8px}
.total-display{display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.total-num{font-size:14px;font-weight:700;color:#27500A;min-width:20px;text-align:center}
.total-edit-wrap{display:flex;align-items:center;gap:5px;justify-content:center}
.total-input{width:60px;padding:5px;font-size:14px;font-weight:600;text-align:center;border:2px solid #3B6D11;border-radius:7px;color:#27500A;outline:none;font-family:inherit}
.total-input:focus{box-shadow:0 0 0 3px rgba(59,109,17,.2)}
.btn-save{padding:5px 8px;background:#3B6D11;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-save:hover{background:#27500A}
.btn-cancel-edit{padding:5px 8px;background:#f3f4f6;color:#6b7280;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
.edit-hint{font-size:10px;color:#6b7280;margin-top:2px}

.stock-out{color:#A32D2D;font-weight:600}
.selected-row{background:#f0fce8}

/* BARRA DE CIERRE FIJA ABAJO */
.cierre-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #3B6D11;padding:12px 1rem;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:50;flex-wrap:wrap}
.cierre-bar.cerrado{border-top-color:#d1d5db;background:#f9fafb}
.cierre-info{font-size:13px;color:#1a1a1a}
.cierre-info strong{color:#27500A}
.cierre-info.cerrado-txt{color:#6b7280}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:16px;padding:1.5rem;max-width:400px;width:90%;text-align:center}
.modal h2{font-size:18px;font-weight:600;margin-bottom:.5rem}
.modal p{font-size:13px;color:#6b7280;margin-bottom:1.25rem;line-height:1.6}
.modal-btns{display:flex;gap:8px;justify-content:center}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(40px);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:#3B6D11}
#toast.error{background:#A32D2D}

@media(max-width:600px){
  .header{flex-direction:column;align-items:flex-start}
  th,td{padding:6px 8px;font-size:12px}
  .venta-input,.total-input{width:50px;font-size:13px}
  .cierre-bar{flex-direction:column;align-items:flex-start;gap:8px}
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="modal"></div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:26px;font-weight:700">⛽ <span style="color:#185FA5">Stock Nochero</span></div>
      <div style="font-size:13px;color:#6b7280;margin-top:4px">Control de stock · Lubricantes y Accesorios</div>
    </div>
    <div class="card">
      <div class="section-title">Ingresar</div>
      <div id="login-msg"></div>
      <label>Usuario</label>
      <select id="sel-user"><option value="">— Seleccioná —</option></select>
      <label>Contraseña</label>
      <input type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <div style="margin-top:1rem">
        <button class="btn btn-primary btn-block" onclick="doLogin()"><i class="ti ti-login"></i> Entrar</button>
      </div>
    </div>
    <div style="text-align:center;font-size:12px;color:#9ca3af;margin-top:1rem" id="login-turno-info"></div>
  </div>
</div>

<!-- OPERADOR -->
<div id="screen-operador" class="screen">
  <div class="container">
    <div class="header">
      <div class="logo">⛽ <span>Stock Nochero</span></div>
      <div class="header-right">
        <div class="turno-bar">
          <span class="badge" id="op-badge-turno"></span>
          <span id="op-fecha"></span>
          <span id="op-num" style="font-size:11px;color:#9ca3af"></span>
        </div>
        <span class="badge badge-operador" id="op-user-badge"></span>
        <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> Salir</button>
      </div>
    </div>
    <div id="op-cerrado-banner"></div>
    <div class="alert alert-info">
      <i class="ti ti-info-circle"></i>
      <div>
        <strong>Columna azul</strong>: ingresá lo que vendiste y presioná ✓ para sumar.<br>
        <strong>Columna verde</strong>: tocá el número si necesitás corregir el total del turno.
      </div>
    </div>
    <div class="tab-bar" id="op-tabs"></div>
    <div class="search-row">
      <input type="text" id="op-search" placeholder="🔍 Buscar producto..." oninput="renderOpTable()">
      <button class="btn btn-sm" onclick="loadAllSheets()" title="Recargar"><i class="ti ti-refresh"></i></button>
    </div>
    <div id="op-table"></div>
  </div>
  <!-- BARRA FIJA DE CIERRE -->
  <div id="cierre-bar" class="cierre-bar">
    <div id="cierre-info" class="cierre-info"></div>
    <button id="cierre-btn" class="btn btn-green" onclick="confirmarCierre()">
      <i class="ti ti-lock"></i> Cerrar e informar turno
    </button>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin" class="screen">
  <div class="container">
    <div class="header">
      <div class="logo">⛽ <span>Stock Nochero</span> <span style="font-size:13px;font-weight:400;color:#6b7280">— Administrador</span></div>
      <div class="header-right">
        <div class="turno-bar">
          <span class="badge" id="adm-badge-turno"></span>
          <span id="adm-fecha"></span>
          <span id="adm-num" style="font-size:11px;color:#9ca3af"></span>
        </div>
        <span class="badge badge-admin" id="adm-user-badge"></span>
        <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> Salir</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" onclick="showAdm('resumen',this)"><i class="ti ti-chart-bar"></i> Resumen del día</button>
      <button class="tab" onclick="showAdm('turnos',this)"><i class="ti ti-clock"></i> Turnos cerrados</button>
      <button class="tab" onclick="showAdm('stock',this)"><i class="ti ti-refresh"></i> Sheets</button>
      <button class="tab" onclick="showAdm('usuarios',this)"><i class="ti ti-users"></i> Usuarios</button>
    </div>
    <div id="adm-content"></div>
  </div>
</div>

<script>
const SHEET_ID   = '1kRZBJo5l51FuVvEsLR8Z_hJV-X2AKHMsW-L-N0NzNBc';
const START_DATE = new Date(2026,5,13);
const START_TI   = 1; // tarde
const PLANILLA_INI = 19186;
const TURNOS = ['mañana','tarde','noche'];
const CATS   = ['Lubricantes','Minimercado','Gas + Hielo'];

const USERS = [
  {id:'franco',  name:'Franco',  role:'admin',    pass:'franco123', refuerzo:false},
  {id:'sergio',  name:'Sergio',  role:'operador', pass:'sergio123', refuerzo:false},
  {id:'elias',   name:'Elías',   role:'operador', pass:'elias123',  refuerzo:false},
  {id:'luciano', name:'Luciano', role:'operador', pass:'luciano123',refuerzo:false},
  {id:'gabi',    name:'Gabi',    role:'operador', pass:'gabi123',   refuerzo:false},
  {id:'eitan',   name:'Eitan',   role:'operador', pass:'eitan123',  refuerzo:true},
  {id:'anibal',  name:'Aníbal',  role:'operador', pass:'anibal123', refuerzo:true},
  {id:'agus',    name:'Agus',    role:'operador', pass:'agus123',   refuerzo:true},
];

let currentUser=null,currentCat=0,admSection='resumen',admCat=0;
let products={'Lubricantes':[],'Minimercado':[],'Gas + Hielo':[]};
let sheetsLoaded=false,sheetsLoading=false;

function getSales(){return JSON.parse(localStorage.getItem('nochero_v4')||'{}')}
function saveSales(s){localStorage.setItem('nochero_v4',JSON.stringify(s))}
function getCierres(){return JSON.parse(localStorage.getItem('nochero_cierres')||'{}')}
function saveCierres(c){localStorage.setItem('nochero_cierres',JSON.stringify(c))}
function getPlanillaOffset(){return parseInt(localStorage.getItem('nochero_planilla_offset')||'0')}
function savePlanillaOffset(n){localStorage.setItem('nochero_planilla_offset',String(n))}
function planillaStr(n){return '#'+String(n).padStart(5,'0')}

function getTurno(d){
  d=d||new Date();
  const h=d.getHours();
  let ti=h>=6&&h<14?0:h>=14&&h<22?1:2;
  let day=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  if(h<6){day=new Date(day);day.setDate(day.getDate()-1);ti=2;}
  const start=new Date(START_DATE.getFullYear(),START_DATE.getMonth(),START_DATE.getDate());
  const diff=Math.round((day-start)/86400000);
  let num;
  if(diff===0){num=PLANILLA_INI+(ti-START_TI);if(num<PLANILLA_INI)num=PLANILLA_INI;}
  else{const t0=3-START_TI;num=PLANILLA_INI+t0+(diff-1)*3+ti;}
  const fk=`${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
  num += getPlanillaOffset();
  return{num,nombre:TURNOS[ti],idx:ti,fecha:day.toLocaleDateString('es-AR'),fechaKey:fk,diff,ti};
}
const T=getTurno();

function parsePrecio(s){return parseInt((s||'').replace(/[$.\s]/g,'').replace(',',''))||0}
function parseNum(s){return parseInt(s)||0}

async function loadSheet(name){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(name)}`;
  const res=await fetch(url);const text=await res.text();
  const rows=text.trim().split('\n').map(l=>{
    const r=[],re=/("(?:[^"]|"")*"|[^,]*),?/g;let m;
    while((m=re.exec(l))!==null){if(m[0]==='')break;r.push(m[1].replace(/^"|"$/g,'').replace(/""/g,'"').trim())}
    return r;
  });
  const prods=[];let hf=false;
  for(const row of rows){
    const f=(row[0]||'').toUpperCase();
    if(f.includes('PRODUCTO')){hf=true;continue;}
    if(!hf)continue;
    const nombre=(row[0]||'').trim();
    if(!nombre||f.includes('TOTAL'))continue;
    prods.push({id:nombre.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/__+/g,'_'),nombre,precio:parsePrecio(row[1]),stockInicial:parseNum(row[2]),categoria:name});
  }
  return prods;
}

async function loadAllSheets(){
  if(sheetsLoading)return;sheetsLoading=true;toast('Cargando desde Sheets...');
  try{
    const[a,b,c]=await Promise.all([loadSheet('Lubricantes'),loadSheet('Minimercado'),loadSheet('Gas + Hielo')]);
    products={'Lubricantes':a,'Minimercado':b,'Gas + Hielo':c};sheetsLoaded=true;
    toast(`✓ ${a.length+b.length+c.length} productos cargados`,'success');
    renderOpTable();updateCierreBar();
    if(admSection==='resumen'||admSection==='stock')renderAdmContent();
  }catch(e){toast('Error al cargar Sheets','error');}
  sheetsLoading=false;
}

function tKey(n){return`T${n}`}
function dayKeys(fk){
  const day=new Date(fk+'T12:00:00');
  const start=new Date(START_DATE.getFullYear(),START_DATE.getMonth(),START_DATE.getDate());
  const diff=Math.round((day-start)/86400000);
  const keys=[];
  for(let i=0;i<3;i++){
    let num;
    if(diff===0){const ti=START_TI+i;if(ti>2)break;num=PLANILLA_INI+i;}
    else{const t0=3-START_TI;num=PLANILLA_INI+t0+(diff-1)*3+i;}
    keys.push(tKey(num));
  }
  return keys;
}

function getSalesTurno(cat,id){const s=getSales();return(s[tKey(T.num)]?.[cat]?.[id])||0}
function getSalesDay(cat,id,fk){const s=getSales();return dayKeys(fk||T.fechaKey).reduce((a,k)=>a+((s[k]?.[cat]?.[id])||0),0)}
function getStock(p){return p.stockInicial-getSalesDay(p.categoria,p.id)}
function isCerrado(num){return!!getCierres()[tKey(num)]}

function addSale(cat,id,qty){
  const s=getSales(),k=tKey(T.num);
  if(!s[k])s[k]={};if(!s[k][cat])s[k][cat]={};
  s[k][cat][id]=(s[k][cat][id]||0)+qty;saveSales(s);
}
function setSale(cat,id,qty){
  const s=getSales(),k=tKey(T.num);
  if(!s[k])s[k]={};if(!s[k][cat])s[k][cat]={};
  if(qty<=0){delete s[k][cat][id];}else{s[k][cat][id]=qty;}
  saveSales(s);
}

// LOGIN
document.addEventListener('DOMContentLoaded',()=>{
  const sel=document.getElementById('sel-user');
  USERS.forEach(u=>{const o=document.createElement('option');o.value=u.id;o.textContent=u.name+(u.role==='admin'?' (Admin)':'');sel.appendChild(o);});
  // Hora actual en Argentina (UTC-3)
  const ahoraAR = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit', hour12:false, timeZone:'America/Argentina/Buenos_Aires'});
  document.getElementById('login-turno-info').innerHTML =
    `<div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:2px">${ahoraAR} hs</div>
     <div style="margin-bottom:2px">Turno <strong>${T.nombre}</strong> · ${T.fecha}</div>
     <div>Planilla <strong>${planillaStr(T.num)}</strong></div>`;
});

function doLogin(){
  const uid=document.getElementById('sel-user').value;
  const pass=document.getElementById('inp-pass').value;
  const user=USERS.find(u=>u.id===uid&&u.pass===pass);
  if(!user){document.getElementById('login-msg').innerHTML='<div class="alert alert-danger"><i class="ti ti-alert-circle"></i> Usuario o contraseña incorrectos.</div>';return;}
  currentUser=user;document.getElementById('login-msg').innerHTML='';document.getElementById('inp-pass').value='';
  showScreen(user.role==='admin'?'admin':'operador');
  if(!sheetsLoaded)loadAllSheets();
}
function logout(){currentUser=null;currentCat=0;showScreen('login');}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(name==='operador')initOp();
  if(name==='admin')initAdm();
}

// OPERADOR
function initOp(){
  document.getElementById('op-badge-turno').textContent='Turno '+T.nombre;
  document.getElementById('op-badge-turno').className='badge badge-'+T.nombre;
  document.getElementById('op-fecha').textContent=T.fecha;
  document.getElementById('op-num').textContent='Planilla '+planillaStr(T.num);
  const badge = document.getElementById('op-user-badge');
  badge.textContent = currentUser.name + (currentUser.refuerzo ? ' ★' : '');
  badge.title = currentUser.refuerzo ? 'Refuerzo de turno' : '';
  buildOpTabs();renderOpTable();updateCierreBar();
}
function buildOpTabs(){
  document.getElementById('op-tabs').innerHTML=CATS.map((c,i)=>`<button class="tab ${i===currentCat?'active':''}" onclick="currentCat=${i};buildOpTabs();renderOpTable()">${c}</button>`).join('');
}

function renderOpTable(){
  const cat=CATS[currentCat];
  const search=(document.getElementById('op-search')?.value||'').toLowerCase();
  const prods=(products[cat]||[]).filter(p=>p.nombre&&(!search||p.nombre.toLowerCase().includes(search)));
  const el=document.getElementById('op-table');
  const cerrado=isCerrado(T.num);

  const banner=document.getElementById('op-cerrado-banner');
  if(banner) banner.innerHTML=cerrado
    ?`<div class="alert alert-warning" style="margin-bottom:1rem"><i class="ti ti-lock"></i> <strong>Turno cerrado</strong> — Este turno ya fue cerrado e informado a administración.</div>`:'';

  if(!sheetsLoaded){el.innerHTML='<div class="alert alert-warning"><i class="ti ti-loader"></i> Cargando productos...</div>';return;}
  if(!prods.length){el.innerHTML='<div class="alert alert-info">Sin productos encontrados.</div>';return;}

  let html=`<div class="table-wrap"><table>
    <thead><tr>
      <th style="min-width:170px">Producto</th>
      <th>Precio</th>
      <th>Stock</th>
      <th class="col-venta">➕ Agregar venta</th>
      <th class="col-total">✏ Total del turno</th>
    </tr></thead><tbody>`;

  for(const p of prods){
    const sf=getStock(p);
    const ts=getSalesTurno(cat,p.id);
    const out=sf<=0;
    const pid=p.id;
    const pn=p.nombre.replace(/'/g,"\\'").replace(/"/g,'\\"');

    html+=`<tr>
      <td><strong>${p.nombre}</strong>${out?` <span class="badge badge-out">Sin stock</span>`:''}</td>
      <td>$${p.precio.toLocaleString('es-AR')}</td>
      <td class="${out?'stock-out':''}">${sf}</td>
      <td class="col-venta">
        <div class="venta-wrap">
          <input type="number" class="venta-input" id="q_${pid}" min="0" value="0"
            ${out||cerrado?'disabled':''}
            oninput="checkOver(this,${sf})"
            onkeydown="if(event.key==='Enter')doAdd('${cat}','${pid}','${pn}',${p.precio},${sf})">
          <button class="btn-add" id="btn_${pid}" ${out||cerrado?'disabled':''} onclick="doAdd('${cat}','${pid}','${pn}',${p.precio},${sf})">
            <i class="ti ti-plus"></i> ✓
          </button>
        </div>
        <div id="warn_${pid}" style="font-size:10px;color:#A32D2D;margin-top:2px;display:none">
          <i class="ti ti-alert-triangle"></i> Supera el stock (${sf})
        </div>
      </td>
      <td class="col-total" id="total-cell-${pid}">
        ${renderTotalCell(cat,pid,ts,sf,cerrado)}
      </td>
    </tr>`;
  }
  html+='</tbody></table></div>';
  el.innerHTML=html;
}

function renderTotalCell(cat,pid,ts,sf,cerrado){
  if(cerrado){
    return ts>0?`<span style="font-size:14px;font-weight:700;color:#27500A">${ts}</span>`:'<span style="color:#9ca3af">—</span>';
  }
  if(ts===0) return `<span style="color:#9ca3af;font-size:13px">—</span>`;
  return `<div class="total-display" onclick="startEdit('${cat}','${pid}',${ts},${sf})" title="Tocá para corregir">
    <span class="total-num">${ts}</span>
    <i class="ti ti-pencil" style="font-size:12px;color:#639922"></i>
  </div>
  <div class="edit-hint">tocá para corregir</div>`;
}

function startEdit(cat,pid,current,maxStock){
  if(isCerrado(T.num))return;
  const cell=document.getElementById('total-cell-'+pid);
  if(!cell)return;
  cell.innerHTML=`<div class="total-edit-wrap">
    <input type="number" class="total-input" id="tedit_${pid}" min="0" max="${maxStock}" value="${current}"
      onkeydown="if(event.key==='Enter')saveEdit('${cat}','${pid}',${maxStock});if(event.key==='Escape')cancelEdit('${cat}','${pid}',${current},${maxStock})">
    <button class="btn-save" onclick="saveEdit('${cat}','${pid}',${maxStock})"><i class="ti ti-check"></i></button>
    <button class="btn-cancel-edit" onclick="cancelEdit('${cat}','${pid}',${current},${maxStock})"><i class="ti ti-x"></i></button>
  </div>`;
  setTimeout(()=>document.getElementById('tedit_'+pid)?.select(),50);
}

function saveEdit(cat,pid,maxStock){
  const inp=document.getElementById('tedit_'+pid);
  const val=parseInt(inp?.value);
  if(isNaN(val)||val<0){toast('Cantidad inválida','error');return;}
  if(val>maxStock){toast(`Supera el stock disponible (${maxStock})`,'error');return;}
  setSale(cat,pid,val);
  toast('✓ Total corregido','success');
  updateCierreBar();
  const sf=getStock(Object.values(products).flat().find(x=>x.id===pid)||{stockInicial:maxStock+val});
  const cell=document.getElementById('total-cell-'+pid);
  if(cell) cell.innerHTML=renderTotalCell(cat,pid,val,maxStock,false);
  // actualizar stock en esa fila
  renderOpTable();
}

function cancelEdit(cat,pid,current,maxStock){
  const cell=document.getElementById('total-cell-'+pid);
  if(cell) cell.innerHTML=renderTotalCell(cat,pid,current,maxStock,false);
}

function checkOver(inp,max){
  const qty=parseInt(inp.value)||0;
  const pid=inp.id.replace('q_','');
  const warn=document.getElementById('warn_'+pid);
  const btn=document.getElementById('btn_'+pid);
  if(qty>max){inp.classList.add('over');if(warn)warn.style.display='block';if(btn)btn.disabled=true;}
  else{inp.classList.remove('over');if(warn)warn.style.display='none';if(btn)btn.disabled=false;}
}

function doAdd(cat,id,nombre,precio,maxStock){
  if(isCerrado(T.num)){toast('El turno está cerrado','error');return;}
  const inp=document.getElementById('q_'+id);
  const qty=parseInt(inp?.value)||0;
  if(qty<=0){toast('Ingresá una cantidad mayor a 0','error');return;}
  const current=getSalesTurno(cat,id);
  const sf=getStock(Object.values(products).flat().find(x=>x.id===id)||{stockInicial:0});
  if(qty>sf){toast(`Stock insuficiente (disponible: ${sf})`,'error');return;}
  addSale(cat,id,qty);
  if(inp){inp.value=0;inp.classList.remove('over');}
  const warn=document.getElementById('warn_'+id);if(warn)warn.style.display='none';
  toast(`✓ +${qty} × ${nombre}  →  $${(qty*precio).toLocaleString('es-AR')}`,'success');
  updateCierreBar();
  renderOpTable();
}

// CIERRE BAR
function getTurnoTotals(){
  const s=getSales(),k=tKey(T.num);
  let u=0,m=0;
  for(const cat of CATS){
    if(!s[k]?.[cat])continue;
    for(const[pid,qty] of Object.entries(s[k][cat])){
      const p=Object.values(products).flat().find(x=>x.id===pid);
      if(p){u+=qty;m+=qty*p.precio;}
    }
  }
  return{u,m};
}

function updateCierreBar(){
  const bar=document.getElementById('cierre-bar');
  const info=document.getElementById('cierre-info');
  const btn=document.getElementById('cierre-btn');
  if(!bar||!info||!btn)return;
  const cerrado=isCerrado(T.num);
  const c=getCierres()[tKey(T.num)];
  if(cerrado){
    bar.className='cierre-bar cerrado';
    info.className='cierre-info cerrado-txt';
    info.innerHTML=`<i class="ti ti-lock"></i> <strong>Turno ${planillaStr(T.num)} cerrado</strong>${c?' · Cerrado por '+c.user+' a las '+c.hora:''}`;
    btn.style.display='none';
  } else {
    bar.className='cierre-bar';
    info.className='cierre-info';
    const{u,m}=getTurnoTotals();
    info.innerHTML=u>0
      ?`Turno <strong>${planillaStr(T.num)}</strong> · <strong>${u} uds</strong> · <strong>$${m.toLocaleString('es-AR')}</strong>`
      :`Turno <strong>${planillaStr(T.num)}</strong> · Sin ventas registradas aún`;
    btn.style.display='';
  }
}

function puedeHacerTurno(){
  // Refuerzos pueden hacer turnos consecutivos
  if(currentUser.refuerzo) return {ok:true};
  // Para el resto: verificar que no hayan cerrado el turno anterior
  const turnoAnteriorNum = T.num - 1;
  if(turnoAnteriorNum < PLANILLA_INI) return {ok:true}; // primer turno del sistema
  const cierres = getCierres();
  const anterior = cierres[tKey(turnoAnteriorNum)];
  if(anterior && anterior.user === currentUser.name){
    const turnoNombreAnterior = anterior.turnoNombre || '';
    return {
      ok: false,
      msg: `No podés cerrar dos turnos consecutivos. Cerraste el turno <strong>${planillaStr(turnoAnteriorNum)}</strong> (${turnoNombreAnterior}). Este turno debe cerrarlo otro empleado.`
    };
  }
  return {ok:true};
}

function confirmarCierre(){
  const check = puedeHacerTurno();
  if(!check.ok){
    const modal=document.getElementById('modal');
    modal.innerHTML=`<div class="modal-overlay">
      <div class="modal">
        <h2 style="color:#A32D2D"><i class="ti ti-alert-circle"></i> Turno no permitido</h2>
        <p>${check.msg}</p>
        <div class="modal-btns">
          <button class="btn btn-primary" onclick="document.getElementById('modal').innerHTML=''">Entendido</button>
        </div>
      </div>
    </div>`;
    return;
  }
  const{u,m}=getTurnoTotals();
  const modal=document.getElementById('modal');
  modal.innerHTML=`<div class="modal-overlay">
    <div class="modal">
      <h2><i class="ti ti-lock"></i> ¿Cerrar turno?</h2>
      <p>Planilla <strong>${planillaStr(T.num)}</strong> · Turno <strong>${T.nombre}</strong> · ${T.fecha}<br><br>
      <strong>${u} unidades vendidas</strong><br>
      Total: <strong>$${m.toLocaleString('es-AR')}</strong><br><br>
      Una vez cerrado no podés agregar más ventas a este turno.</p>
      <div class="modal-btns">
        <button class="btn" onclick="document.getElementById('modal').innerHTML=''">Cancelar</button>
        <button class="btn btn-green" onclick="ejecutarCierre(${u},${m})"><i class="ti ti-check"></i> Confirmar cierre</button>
      </div>
    </div>
  </div>`;
}

function ejecutarCierre(u,m){
  const ahora=new Date();
  const hora=ahora.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/Argentina/Buenos_Aires'});
  const c=getCierres();
  c[tKey(T.num)]={user:currentUser.name,hora,fecha:T.fecha,planilla:T.num,totalU:u,totalM:m,turnoNombre:T.nombre};
  saveCierres(c);
  document.getElementById('modal').innerHTML='';
  toast('✓ Turno cerrado e informado','success');
  updateCierreBar();renderOpTable();
}

// Suma ventas solo de turnos cerrados del día
function getSalesDayClosed(cat,id,fk){
  const s=getSales();
  const c=getCierres();
  return dayKeys(fk||T.fechaKey).reduce((a,k)=>{
    const num=parseInt(k.replace('T',''));
    if(!isCerrado(num)) return a; // solo turnos cerrados
    return a+((s[k]?.[cat]?.[id])||0);
  },0);
}

function renderResumen(){
  const cat=CATS[admCat];

  const totU=rows.reduce((a,r)=>a+r.ventas,0);

    const k=keys[i]||'';const s=getSales();let m=0,u=0;

    const cerrado=num?isCerrado(num):false;
    const ci=num?getCierres()[tKey(num)]:null;
    // Usar totales del cierre si existe (más confiable)
    if(ci){m=ci.totalM;u=ci.totalU;}
    else if(s[k]?.[cat]){
      for(const[pid,q]of Object.entries(s[k][cat])){
        const p=(products[cat]||[]).find(x=>x.id===pid);if(p){m+=q*p.precio;u+=q;}
      }
    }
    return{nom,m,u,cerrado,ci,num,k};
  });
  return`
  <div class="metrics">
    <div class="metric"><div class="metric-val">${totU}</div><div class="metric-lbl">Unidades vendidas hoy</div></div>
    <div class="metric"><div class="metric-val">$${totM.toLocaleString('es-AR')}</div><div class="metric-lbl">Monto cobrado hoy</div></div>
    <div class="metric"><div class="metric-val">${totP}</div><div class="metric-lbl">Productos movidos</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem">
    ${porTurno.map(t=>`<div class="metric" style="position:relative">
      <div style="margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap">
        <span class="badge badge-${t.nom}">${t.nom}</span>
        ${t.num?`<span style="font-size:10px;color:#9ca3af">${planillaStr(t.num)}</span>`:''}
        ${t.cerrado
          ?`<span class="badge badge-cerrado"><i class="ti ti-lock" style="font-size:10px"></i> cerrado</span>`
          :(t.num?'<span style="font-size:10px;color:#f59e0b">● abierto</span>':'<span style="font-size:10px;color:#d1d5db">sin datos</span>')}
      </div>
      <div class="metric-val" style="font-size:${t.cerrado?'18':'14'}px;color:${t.cerrado?'#1a1a1a':'#9ca3af'}">
        ${t.cerrado?'$'+t.m.toLocaleString('es-AR'):t.num?'pendiente':'-'}
      </div>
      ${t.ci?`<div style="font-size:11px;color:#6b7280;margin-top:2px">${t.ci.user} · ${t.ci.hora}</div>`:''}
      ${t.cerrado&&t.num?`<div style="margin-top:8px;display:flex;gap:4px;justify-content:center">
        <button class="btn btn-sm" style="font-size:11px;padding:3px 8px;color:#185FA5;border-color:#185FA5" onclick="reabrirTurno('${t.k}',${t.num})" title="Reabrir turno">
          <i class="ti ti-lock-open"></i> Reabrir
        </button>
        <button class="btn btn-sm" style="font-size:11px;padding:3px 8px;color:#A32D2D;border-color:#A32D2D" onclick="borrarTurno('${t.k}',${t.num})" title="Borrar turno">

    <thead><tr><th>Producto</th><th>Precio</th><th>Stock ini.</th><th class="col-venta">Ventas del día</th><th>Stock final</th><th>Monto</th></tr></thead>
    <tbody>${rows.map(r=>`<tr style="${r.ventas>0?'font-weight:500':''}">
      <td>${r.nombre}</td><td>$${r.precio.toLocaleString('es-AR')}</td><td>${r.stockInicial}</td>

      <td>${r.monto>0?'$'+r.monto.toLocaleString('es-AR'):'—'}</td>

function getTurnoNombreFromNum(num){
  // Derivar turno (mañana/tarde/noche) desde el número de planilla
  const rel = (num - PLANILLA_INI);
  const t0 = 3 - START_TI; // turnos en dia 0
  let ti;
  if(rel < t0){
    ti = START_TI + rel;
  } else {
    ti = (rel - t0) % 3;
  }
  return TURNOS[Math.max(0,Math.min(2,ti))];
}

function renderTurnos(detailKey){
  const c=getCierres();
  const items=Object.entries(c).sort((a,b)=>b[1].planilla-a[1].planilla);
  if(!items.length)return`<div class="alert alert-info"><i class="ti ti-info-circle"></i> Aún no hay turnos cerrados.</div>`;

  let html=`<div class="card">
    <div class="section-title"><i class="ti ti-clock"></i> Turnos cerrados <span style="font-size:12px;font-weight:400;color:#6b7280">— hacé clic en una fila para ver el detalle</span></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Planilla</th><th>Fecha</th><th>Turno</th><th>Cerrado por</th><th>Hora</th><th>Uds</th><th>Total $</th><th></th></tr></thead>
      <tbody>`;

  for(const [k,v] of items){
    const isOpen = detailKey===k;
    const turnoNombre = v.turnoNombre || getTurnoNombreFromNum(v.planilla);
    html+=`<tr style="cursor:pointer" onclick="showAdm('turnos-${k}',null)" class="${isOpen?'selected-row':''}">
      <td><strong>${planillaStr(v.planilla)}</strong></td>
      <td>${v.fecha}</td>
      <td>${turnoNombre?`<span class="badge badge-${turnoNombre}">${turnoNombre}</span>`:''}</td>
      <td>${v.user}${v.editadoPor?' <span style="font-size:10px;color:#185FA5">(editado)</span>':''}</td><td>${v.hora}</td>
      <td>${v.totalU}</td>
      <td>$${v.totalM.toLocaleString('es-AR')}</td>
      <td><i class="ti ti-chevron-${isOpen?'up':'down'}" style="color:#6b7280;font-size:14px"></i></td>
    </tr>`;
    if(isOpen){
      const em=turnoEditModes[k]||false;
      html+=`<tr><td colspan="8" style="padding:0;background:#f9fafb">
        <div style="padding:1rem">${renderTurnoDetalle(k,v,em)}</div>
      </td></tr>`;
    }
  }
  html+=`</tbody></table></div></div>`;
  return html;
}

function renderTurnoDetalle(tk, cierre, editMode){

    </div>
    ${!editMode?`<button class="btn btn-sm" style="border-color:#185FA5;color:#185FA5" onclick="toggleEditTurno('${tk}',true)">

    </button>`:`<button class="btn btn-sm" onclick="toggleEditTurno('${tk}',false)">
      <i class="ti ti-x"></i> Cancelar edición
    </button>`}

    hayVentas=true;

    html+=`<div style="font-size:11px;font-weight:700;color:#6b7280;margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px">${cat}</div>`;
    html+=`<table style="width:100%;font-size:13px;border-collapse:collapse">
      <thead><tr>
        <th style="text-align:left;padding:5px 8px;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb;background:#f9fafb">Producto</th>
        <th style="text-align:center;padding:5px 8px;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb;background:#f9fafb">Cantidad</th>
        <th style="text-align:right;padding:5px 8px;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb;background:#f9fafb">Precio</th>
        <th style="text-align:right;padding:5px 8px;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb;background:#f9fafb">Subtotal</th>
      </tr></thead><tbody>`;

    for(const p of prodsAMostrar){

      if(editMode){

              id="admEdit_${tk}_${cat}_${p.id}"
              onchange="recalcAdmEdit('${tk}')">
          </td>
          <td style="padding:5px 8px;border-bottom:1px solid #f3f4f6;text-align:right;color:#6b7280">$${p.precio.toLocaleString('es-AR')}</td>

          <td style="padding:5px 8px;border-bottom:1px solid #f3f4f6">${p.nombre}</td>

          <td style="padding:5px 8px;border-bottom:1px solid #f3f4f6;text-align:right;color:#6b7280">$${p.precio.toLocaleString('es-AR')}</td>
          <td style="padding:5px 8px;border-bottom:1px solid #f3f4f6;text-align:right;font-weight:600">$${subtotal.toLocaleString('es-AR')}</td>

    html+=`</tbody></table>`;

  if(!hayVentas&&!editMode) html+=`<div style="color:#9ca3af;font-size:13px">Sin ventas registradas en este turno.</div>`;

  html+=`<div style="margin-top:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div id="admEdit-total-${tk}" style="font-size:14px;font-weight:700;color:#1a1a1a">
      Total: $${totalM.toLocaleString('es-AR')} · ${totalU} unidades
    </div>
    ${editMode?`<button class="btn btn-green" onclick="guardarEdicionTurno('${tk}')">
      <i class="ti ti-device-floppy"></i> Guardar correcciones
    </button>`:''}
  </div>`;
  return html;
}

let turnoEditModes={};
function toggleEditTurno(tk, mode){
  turnoEditModes[tk]=mode;
  renderAdmContent();
  // Scroll to the open row
  setTimeout(()=>{
    const el=document.getElementById('admEdit_'+tk+'_'+Object.keys(getSales()[tk]||{CATS:CATS})[0]);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function recalcAdmEdit(tk){
  const s=getSales();
  let totalU=0,totalM=0;
  for(const cat of CATS){
    for(const p of (products[cat]||[])){
      const inp=document.getElementById(`admEdit_${tk}_${cat}_${p.id}`);
      if(!inp) continue;
      const qty=parseInt(inp.value)||0;
      const sub=qty*p.precio;
      totalU+=qty;totalM+=sub;
      const subEl=document.getElementById(`sub_${tk}_${cat}_${p.id}`);
      if(subEl) subEl.textContent='$'+sub.toLocaleString('es-AR');
    }
  }
  const totalEl=document.getElementById('admEdit-total-'+tk);
  if(totalEl) totalEl.innerHTML=`Total: <span style="color:#185FA5">$${totalM.toLocaleString('es-AR')}</span> · ${totalU} unidades`;
}

function guardarEdicionTurno(tk){
  const s=getSales();
  if(!s[tk]) s[tk]={};
  let totalU=0,totalM=0;
  for(const cat of CATS){
    if(!s[tk][cat]) s[tk][cat]={};
    for(const p of (products[cat]||[])){
      const inp=document.getElementById(`admEdit_${tk}_${cat}_${p.id}`);
      if(!inp) continue;
      const qty=parseInt(inp.value)||0;
      if(qty>0){s[tk][cat][p.id]=qty;totalU+=qty;totalM+=qty*p.precio;}
      else{delete s[tk][cat][p.id];}
    }
  }
  saveSales(s);
  // Update cierre totals
  const c=getCierres();
  if(c[tk]){c[tk].totalU=totalU;c[tk].totalM=totalM;c[tk].editadoPor='Franco';c[tk].editadoHora=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});}
  saveCierres(c);
  turnoEditModes[tk]=false;
  toast('✓ Correcciones guardadas','success');
  renderAdmContent();
}
function reabrirTurno(k, num){
  const modal=document.getElementById('modal');
  modal.innerHTML=`<div class="modal-overlay">
    <div class="modal">
      <h2><i class="ti ti-lock-open"></i> ¿Reabrir turno?</h2>
      <p>La planilla <strong>${planillaStr(num)}</strong> volverá a estar abierta.<br>El empleado podrá seguir cargando ventas.</p>
      <div class="modal-btns">
        <button class="btn" onclick="document.getElementById('modal').innerHTML=''">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarReabrir('${k}')"><i class="ti ti-lock-open"></i> Reabrir</button>
      </div>
    </div>
  </div>`;
}

function confirmarReabrir(k){
  const c=getCierres();
  delete c[k];
  saveCierres(c);
  document.getElementById('modal').innerHTML='';
  toast('✓ Turno reabierto','success');
  renderAdmContent();
}

function borrarTurno(k, num){
  const modal=document.getElementById('modal');
  modal.innerHTML=`<div class="modal-overlay">
    <div class="modal">
      <h2 style="color:#A32D2D"><i class="ti ti-trash"></i> ¿Borrar turno?</h2>
      <p>Esto eliminará <strong>todas las ventas</strong> de la planilla <strong>${planillaStr(num)}</strong> y no se puede deshacer.</p>
      <div class="modal-btns">
        <button class="btn" onclick="document.getElementById('modal').innerHTML=''">Cancelar</button>
        <button class="btn btn-danger" onclick="confirmarBorrar('${k}')"><i class="ti ti-trash"></i> Borrar todo</button>
      </div>
    </div>
  </div>`;
}

function confirmarBorrar(k){
  const s=getSales();
  delete s[k];
  saveSales(s);
  const c=getCierres();
  delete c[k];
  saveCierres(c);
  document.getElementById('modal').innerHTML='';
  toast('Turno eliminado','error');
  renderAdmContent();
}

function renderStock(){
  const total=Object.values(products).reduce((a,v)=>a+v.length,0);
  const planillaActual=T.num;
  const offsetActual=getPlanillaOffset();
  return`<div class="card">
    <div class="section-title"><i class="ti ti-refresh"></i> Recargar desde Google Sheets</div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:1rem">Trae precios y stock inicial actualizados.</p>
    <button class="btn btn-primary" onclick="loadAllSheets()"><i class="ti ti-refresh"></i> Recargar ahora</button>
    ${sheetsLoaded?`<div class="alert alert-success" style="margin-top:1rem"><i class="ti ti-check"></i> ${total} productos cargados.</div>`:''}
  </div>
  <div class="card">
    <div class="section-title"><i class="ti ti-hash"></i> Actualizar número de planilla</div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:12px">
      Planilla actual del sistema: <strong>${planillaStr(planillaActual)}</strong>
      ${offsetActual!==0?`<span style="font-size:12px;color:#185FA5"> (ajuste aplicado: ${offsetActual>0?'+':''}${offsetActual})</span>`:''}
    </p>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div>
        <label style="margin-top:0;margin-bottom:4px">Establecer planilla correcta para el turno actual:</label>
        <input type="number" id="inp-planilla-nueva" value="${planillaActual}" style="width:140px;margin-top:0">
      </div>
      <button class="btn btn-primary" style="margin-top:18px" onclick="actualizarPlanilla()">
        <i class="ti ti-check"></i> Aplicar
      </button>
      ${offsetActual!==0?`<button class="btn" style="margin-top:18px;color:#A32D2D;border-color:#A32D2D" onclick="resetPlanilla()">
        <i class="ti ti-refresh"></i> Resetear
      </button>`:''}
    </div>
    <p style="font-size:12px;color:#9ca3af;margin-top:10px"><i class="ti ti-info-circle"></i> Esto ajusta el número visible sin borrar datos.</p>
  </div>
  <div class="card">
    <div class="section-title"><i class="ti ti-external-link"></i> Editar en Google Sheets</div>
    <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" class="btn"><i class="ti ti-table"></i> Abrir Google Sheets</a>
  </div>`;
}

function actualizarPlanilla(){
  const nueva=parseInt(document.getElementById('inp-planilla-nueva')?.value)||T.num;
  const offset=nueva-T.num;
  savePlanillaOffset(offset);
  toast(`✓ Planilla actualizada a ${planillaStr(nueva)}`,'success');
  setTimeout(()=>location.reload(),1200);
}

function resetPlanilla(){
  savePlanillaOffset(0);
  toast('Número de planilla reseteado','success');
  setTimeout(()=>location.reload(),1200);
}
function renderUsuarios(){
  return`<div class="card">
    <div class="section-title"><i class="ti ti-users"></i> Usuarios</div>
    <table><thead><tr><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Contraseña</th></tr></thead>
    <tbody>${USERS.map(u=>`<tr><td><strong>${u.name}</strong></td><td><code>${u.id}</code></td><td><span class="badge badge-${u.role==='admin'?'admin':'operador'}">${u.role}</span></td><td><code>${u.pass}</code></td></tr>`).join('')}</tbody>
    </table></div>`;
}

let toastTimer;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=type;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
</body>
</html>
