<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nochero · Control de Stock</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a1a}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.container{max-width:980px;margin:0 auto;padding:1rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:14px;font-family:inherit;transition:background .15s}
.btn:hover{background:#f3f4f6}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-danger{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn-danger:hover{background:#791F1F}
.btn-green{background:#3B6D11;color:#fff;border-color:#3B6D11}
.btn-green:hover{background:#27500A}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-block{width:100%;justify-content:center}
label{font-size:13px;color:#6b7280;display:block;margin-top:10px;margin-bottom:3px}
input,select{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;font-size:14px;outline:none;transition:border .15s}
input:focus,select:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
.badge-mañana{background:#E6F1FB;color:#0C447C}
.badge-tarde{background:#FAEEDA;color:#633806}
.badge-noche{background:#EEEDFE;color:#3C3489}
.badge-admin{background:#EAF3DE;color:#27500A}
.badge-operador{background:#FEF3C7;color:#92400E}
.badge-ok{background:#EAF3DE;color:#27500A}
.badge-out{background:#FCEBEB;color:#A32D2D}
.badge-cerrado{background:#f3f4f6;color:#6b7280}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.alert-info{background:#E6F1FB;color:#0C447C}
.alert-success{background:#EAF3DE;color:#27500A}
.alert-danger{background:#FCEBEB;color:#A32D2D}
.alert-warning{background:#FAEEDA;color:#633806}
.tab-bar{display:flex;gap:4px;margin-bottom:1rem;background:#f3f4f6;border-radius:10px;padding:4px}
.tab{flex:1;padding:7px 4px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;border:none;background:transparent;color:#6b7280;transition:all .15s;font-family:inherit}
.tab.active{background:#fff;color:#1a1a1a;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid #e5e7eb}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
th{text-align:left;padding:10px 12px;color:#6b7280;border-bottom:1px solid #e5e7eb;font-weight:500;white-space:nowrap;background:#f9fafb}
td{padding:9px 12px;border-bottom:1px solid #f3f4f6;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding:1rem 1.25rem;background:#fff;border-radius:12px;border:1px solid #e5e7eb;flex-wrap:wrap;gap:10px}
.logo{font-size:18px;font-weight:600}
.logo span{color:#185FA5}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1rem}
.metric{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:.875rem;text-align:center}
.metric-val{font-size:20px;font-weight:600}
.metric-lbl{font-size:11px;color:#6b7280;margin-top:3px}
.login-wrap{max-width:380px;margin:3rem auto;padding:0 1rem}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px}
.search-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.search-row input{flex:1;margin:0}
.turno-bar{font-size:12px;color:#6b7280;display:flex;align-items:center;gap:6px}
th.col-venta{background:#185FA5;color:#fff;text-align:center;font-weight:700}
td.col-venta{background:#EBF4FF;text-align:center;padding:6px 8px}
.venta-input-wrap{display:flex;align-items:center;justify-content:center;gap:6px}
.venta-input{width:64px;padding:7px 6px;font-size:15px;font-weight:600;text-align:center;border:2px solid #185FA5;border-radius:8px;background:#fff;color:#185FA5;outline:none}
.venta-input:focus{box-shadow:0 0 0 3px rgba(24,95,165,.2)}
.venta-input.over{border-color:#A32D2D;color:#A32D2D;box-shadow:0 0 0 3px rgba(163,45,45,.15)}
.venta-input:disabled{background:#f3f4f6;border-color:#d1d5db;color:#9ca3af}
.btn-registrar{padding:6px 10px;background:#185FA5;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}
.btn-registrar:hover{background:#0C447C}
.btn-registrar:disabled{background:#d1d5db;cursor:not-allowed}
.stock-out{color:#A32D2D;font-weight:600}
.cierre-box{background:#fff;border:2px solid #3B6D11;border-radius:12px;padding:1.25rem;margin-top:1.5rem;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:16px;padding:1.5rem;max-width:400px;width:90%;text-align:center}
.modal h2{font-size:18px;font-weight:600;margin-bottom:.5rem}
.modal p{font-size:13px;color:#6b7280;margin-bottom:1.25rem;line-height:1.5}
.modal .btns{display:flex;gap:8px;justify-content:center}
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:#3B6D11}
#toast.error{background:#A32D2D}
@media(max-width:600px){
  .header{flex-direction:column;align-items:flex-start}
  th,td{padding:7px 8px;font-size:12px}
  .venta-input{width:52px;font-size:14px}
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="modal"></div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:26px;font-weight:700">⛽ <span style="color:#185FA5">Nochero</span></div>
      <div style="font-size:13px;color:#6b7280;margin-top:4px">Control de stock · Lubricantes y Accesorios</div>
    </div>
    <div class="card">
      <div class="section-title">Ingresar</div>
      <div id="login-msg"></div>
      <label>Usuario</label>
      <select id="sel-user"><option value="">— Seleccioná —</option></select>
      <label>Contraseña</label>
      <input type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <div style="margin-top:1rem">
        <button class="btn btn-primary btn-block" onclick="doLogin()"><i class="ti ti-login"></i> Entrar</button>
      </div>
    </div>
    <div style="text-align:center;font-size:12px;color:#9ca3af;margin-top:1rem" id="login-turno-info"></div>
  </div>
</div>

<!-- OPERADOR -->
<div id="screen-operador" class="screen">
  <div class="container">
    <div class="header">
      <div class="logo">⛽ <span>Nochero</span></div>
      <div class="header-right">
        <div class="turno-bar">
          <span class="badge" id="op-badge-turno"></span>
          <span id="op-fecha"></span>
          <span id="op-num" style="font-size:11px;color:#9ca3af"></span>
        </div>
        <span class="badge badge-operador" id="op-user-badge"></span>
        <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> Salir</button>
      </div>
    </div>
    <div id="op-cerrado-banner"></div>
    <div class="alert alert-info">
      <i class="ti ti-info-circle"></i>
      <span>Ingresá la cantidad vendida en la columna azul <strong>"Cantidad vendida"</strong> y presioná <strong>✓</strong>. Al terminar tu turno, cerralo abajo.</span>
    </div>
    <div class="tab-bar" id="op-tabs"></div>
    <div class="search-row">
      <input type="text" id="op-search" placeholder="🔍 Buscar producto..." oninput="renderOpTable()">
      <button class="btn btn-sm" onclick="loadAllSheets()" title="Recargar"><i class="ti ti-refresh"></i></button>
    </div>
    <div id="op-table"></div>
    <div id="op-cierre"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin" class="screen">
  <div class="container">
    <div class="header">
      <div class="logo">⛽ <span>Nochero</span> <span style="font-size:13px;font-weight:400;color:#6b7280">— Administrador</span></div>
      <div class="header-right">
        <div class="turno-bar">
          <span class="badge" id="adm-badge-turno"></span>
          <span id="adm-fecha"></span>
          <span id="adm-num" style="font-size:11px;color:#9ca3af"></span>
        </div>
        <span class="badge badge-admin" id="adm-user-badge"></span>
        <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> Salir</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" onclick="showAdm('resumen',this)"><i class="ti ti-chart-bar"></i> Resumen del día</button>
      <button class="tab" onclick="showAdm('turnos',this)"><i class="ti ti-clock"></i> Turnos cerrados</button>
      <button class="tab" onclick="showAdm('stock',this)"><i class="ti ti-refresh"></i> Sheets</button>
      <button class="tab" onclick="showAdm('usuarios',this)"><i class="ti ti-users"></i> Usuarios</button>
    </div>
    <div id="adm-content"></div>
  </div>
</div>

<script>
const SHEET_ID = '1kRZBJo5l51FuVvEsLR8Z_hJV-X2AKHMsW-L-N0NzNBc';
// Arranque: tarde del 13/06/2026 = Planilla #19186
const START_DATE    = new Date(2026, 5, 13); // 13 jun 2026
const START_TURNO   = 1;   // 0=mañana 1=tarde 2=noche
const PLANILLA_INI  = 19186;
const TURNOS = ['mañana','tarde','noche'];
const CATS   = ['Lubricantes','Minimercado','Gas + Hielo'];

const USERS = [
  {id:'franco',  name:'Franco',  role:'admin',    pass:'franco123'},
  {id:'sergio',  name:'Sergio',  role:'operador', pass:'sergio123'},
  {id:'elias',   name:'Elías',   role:'operador', pass:'elias123'},
  {id:'luciano', name:'Luciano', role:'operador', pass:'luciano123'},
  {id:'gabi',    name:'Gabi',    role:'operador', pass:'gabi123'},
  {id:'eitan',   name:'Eitan',   role:'operador', pass:'eitan123'},
  {id:'anibal',  name:'Aníbal',  role:'operador', pass:'anibal123'},
  {id:'agus',    name:'Agus',    role:'operador', pass:'agus123'},
];

let currentUser=null, currentCat=0, admSection='resumen', admCat=0;
let products={'Lubricantes':[],'Minimercado':[],'Gas + Hielo':[]};
let sheetsLoaded=false, sheetsLoading=false;

function getSales(){return JSON.parse(localStorage.getItem('nochero_v4')||'{}')}
function saveSales(s){localStorage.setItem('nochero_v4',JSON.stringify(s))}
function getCierres(){return JSON.parse(localStorage.getItem('nochero_cierres')||'{}')}
function saveCierres(c){localStorage.setItem('nochero_cierres',JSON.stringify(c))}

function getTurno(d){
  d = d || new Date();
  const h = d.getHours();
  let ti = h>=6&&h<14 ? 0 : h>=14&&h<22 ? 1 : 2;
  let day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if(h < 6){ day = new Date(day); day.setDate(day.getDate()-1); ti = 2; }
  const start = new Date(START_DATE.getFullYear(), START_DATE.getMonth(), START_DATE.getDate());
  const diffDays = Math.round((day - start) / 86400000);
  let num;
  if(diffDays === 0){
    num = PLANILLA_INI + (ti - START_TURNO);
    if(num < PLANILLA_INI) num = PLANILLA_INI;
  } else {
    const t0 = 3 - START_TURNO; // turnos en dia 0
    num = PLANILLA_INI + t0 + (diffDays-1)*3 + ti;
  }
  const fk = `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
  return {num, nombre:TURNOS[ti], idx:ti, fecha:day.toLocaleDateString('es-AR'), fechaKey:fk, diffDays, ti};
}
const T = getTurno();

function planillaStr(n){ return '#' + String(n).padStart(5,'0'); }

function parsePrecio(s){return parseInt((s||'').replace(/[$.\s]/g,'').replace(',',''))||0}
function parseNum(s){return parseInt(s)||0}

async function loadSheet(name){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(name)}`;
  const res=await fetch(url);
  const text=await res.text();
  const rows=text.trim().split('\n').map(l=>{
    const r=[],re=/("(?:[^"]|"")*"|[^,]*),?/g;let m;
    while((m=re.exec(l))!==null){if(m[0]==='')break;r.push(m[1].replace(/^"|"$/g,'').replace(/""/g,'"').trim())}
    return r;
  });
  const prods=[];let hf=false;
  for(const row of rows){
    const f=(row[0]||'').toUpperCase();
    if(f.includes('PRODUCTO')){hf=true;continue;}
    if(!hf)continue;
    const nombre=(row[0]||'').trim();
    if(!nombre||f.includes('TOTAL'))continue;
    prods.push({id:nombre.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/__+/g,'_'),nombre,precio:parsePrecio(row[1]),stockInicial:parseNum(row[2]),categoria:name});
  }
  return prods;
}

async function loadAllSheets(){
  if(sheetsLoading)return;
  sheetsLoading=true;
  toast('Cargando desde Google Sheets...');
  try{
    const[a,b,c]=await Promise.all([loadSheet('Lubricantes'),loadSheet('Minimercado'),loadSheet('Gas + Hielo')]);
    products={'Lubricantes':a,'Minimercado':b,'Gas + Hielo':c};
    sheetsLoaded=true;
    toast(`✓ ${a.length+b.length+c.length} productos cargados`,'success');
    renderOpTable(); renderCierre();
    if(admSection==='resumen'||admSection==='stock') renderAdmContent();
  }catch(e){toast('Error al cargar. ¿El Sheets es público?','error');}
  sheetsLoading=false;
}

// Turno keys
function tKey(n){return `T${n}`}
function dayKeys(fk){
  const day=new Date(fk+'T12:00:00');
  const start=new Date(START_DATE.getFullYear(),START_DATE.getMonth(),START_DATE.getDate());
  const diff=Math.round((day-start)/86400000);
  const keys=[];
  for(let i=0;i<3;i++){
    let num;
    if(diff===0){
      const ti=START_TURNO+i; if(ti>2)break;
      num=PLANILLA_INI+i;
    } else {
      const t0=3-START_TURNO;
      num=PLANILLA_INI+t0+(diff-1)*3+i;
    }
    keys.push(tKey(num));
  }
  return keys;
}

function getSalesTurno(cat,id){const s=getSales();return(s[tKey(T.num)]?.[cat]?.[id])||0}
function getSalesDay(cat,id,fk){const s=getSales();return dayKeys(fk||T.fechaKey).reduce((a,k)=>a+((s[k]?.[cat]?.[id])||0),0)}
function getStock(p){return p.stockInicial-getSalesDay(p.categoria,p.id)}
function recordSale(cat,id,qty){
  const s=getSales(),k=tKey(T.num);
  if(!s[k])s[k]={};if(!s[k][cat])s[k][cat]={};
  s[k][cat][id]=(s[k][cat][id]||0)+qty;saveSales(s);
}

function isTurnoCerrado(num){return !!getCierres()[tKey(num)]}

// LOGIN
document.addEventListener('DOMContentLoaded',()=>{
  const sel=document.getElementById('sel-user');
  USERS.forEach(u=>{const o=document.createElement('option');o.value=u.id;o.textContent=u.name+(u.role==='admin'?' (Admin)':'');sel.appendChild(o);});
  document.getElementById('login-turno-info').textContent=`Turno ${T.nombre} · ${T.fecha} · Planilla ${planillaStr(T.num)}`;
});

function doLogin(){
  const uid=document.getElementById('sel-user').value;
  const pass=document.getElementById('inp-pass').value;
  const user=USERS.find(u=>u.id===uid&&u.pass===pass);
  if(!user){document.getElementById('login-msg').innerHTML='<div class="alert alert-danger"><i class="ti ti-alert-circle"></i> Usuario o contraseña incorrectos.</div>';return;}
  currentUser=user;
  document.getElementById('login-msg').innerHTML='';
  document.getElementById('inp-pass').value='';
  showScreen(user.role==='admin'?'admin':'operador');
  if(!sheetsLoaded) loadAllSheets();
}
function logout(){currentUser=null;currentCat=0;showScreen('login');}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(name==='operador') initOp();
  if(name==='admin') initAdm();
}

// OPERADOR
function initOp(){
  document.getElementById('op-badge-turno').textContent='Turno '+T.nombre;
  document.getElementById('op-badge-turno').className='badge badge-'+T.nombre;
  document.getElementById('op-fecha').textContent=T.fecha;
  document.getElementById('op-num').textContent='Planilla '+planillaStr(T.num);
  document.getElementById('op-user-badge').textContent=currentUser.name;
  buildOpTabs(); renderOpTable(); renderCierre();
}

function buildOpTabs(){
  document.getElementById('op-tabs').innerHTML=CATS.map((c,i)=>`<button class="tab ${i===currentCat?'active':''}" onclick="currentCat=${i};buildOpTabs();renderOpTable()">${c}</button>`).join('');
}

function renderOpTable(){
  const cat=CATS[currentCat];
  const search=(document.getElementById('op-search')?.value||'').toLowerCase();
  const prods=(products[cat]||[]).filter(p=>p.nombre&&(!search||p.nombre.toLowerCase().includes(search)));
  const el=document.getElementById('op-table');
  const cerrado=isTurnoCerrado(T.num);

  if(!sheetsLoaded){el.innerHTML='<div class="alert alert-warning"><i class="ti ti-loader"></i> Cargando productos...</div>';return;}
  if(!prods.length){el.innerHTML='<div class="alert alert-info"><i class="ti ti-info-circle"></i> Sin productos.</div>';return;}

  let html=`<div class="table-wrap"><table>
    <thead><tr>
      <th style="min-width:180px">Producto</th>
      <th>Precio</th>
      <th>Stock disponible</th>
      <th class="col-venta">✏ Cantidad vendida</th>
      <th>Vendido este turno</th>
    </tr></thead><tbody>`;

  for(const p of prods){
    const sf=getStock(p);
    const ts=getSalesTurno(cat,p.id);
    const out=sf<=0;
    const pid=p.id;
    const pn=p.nombre.replace(/'/g,"\\'").replace(/"/g,'\\"');
    html+=`<tr>
      <td><strong>${p.nombre}</strong>${out?` <span class="badge badge-out">Sin stock</span>`:''}</td>
      <td>$${p.precio.toLocaleString('es-AR')}</td>
      <td class="${out?'stock-out':''}">${sf}</td>
      <td class="col-venta">
        <div class="venta-input-wrap">
          <input type="number" class="venta-input" id="q_${pid}" min="0" max="${sf}" value="0"
            ${out||cerrado?'disabled':''}
            oninput="checkOver(this,${sf})"
            onkeydown="if(event.key==='Enter')doSale('${cat}','${pid}','${pn}',${p.precio})">
          <button class="btn-registrar" id="btn_${pid}" ${out||cerrado?'disabled':''} onclick="doSale('${cat}','${pid}','${pn}',${p.precio})">
            <i class="ti ti-check"></i> ✓
          </button>
        </div>
        <div id="warn_${pid}" style="font-size:11px;color:#A32D2D;margin-top:3px;display:none">
          <i class="ti ti-alert-triangle"></i> Supera el stock disponible (${sf})
        </div>
      </td>
      <td style="text-align:center">${ts?`<span class="badge badge-ok">${ts}</span>`:'—'}</td>
    </tr>`;
  }
  html+='</tbody></table></div>';
  el.innerHTML=html;
}

function checkOver(inp,max){
  const qty=parseInt(inp.value)||0;
  const id=inp.id.replace('q_','');
  const warn=document.getElementById('warn_'+id);
  const btn=document.getElementById('btn_'+id);
  if(qty>max){inp.classList.add('over');if(warn)warn.style.display='block';if(btn)btn.disabled=true;}
  else{inp.classList.remove('over');if(warn)warn.style.display='none';if(btn)btn.disabled=false;}
}

function doSale(cat,id,nombre,precio){
  if(isTurnoCerrado(T.num)){toast('El turno está cerrado','error');return;}
  const inp=document.getElementById('q_'+id);
  const qty=parseInt(inp?.value)||0;
  if(qty<=0){toast('Ingresá una cantidad mayor a 0','error');return;}
  const p=products[cat].find(x=>x.id===id);
  if(!p)return;
  if(qty>getStock(p)){toast(`Stock insuficiente (disponible: ${getStock(p)})`,'error');return;}
  recordSale(cat,id,qty);
  if(inp){inp.value=0;inp.classList.remove('over');}
  const warn=document.getElementById('warn_'+id);if(warn)warn.style.display='none';
  toast(`✓ ${qty} × ${nombre}  →  $${(qty*precio).toLocaleString('es-AR')}`,'success');
  renderOpTable();
}

function renderCierre(){
  const el=document.getElementById('op-cierre');if(!el)return;
  const cerrado=isTurnoCerrado(T.num);
  const c=getCierres()[tKey(T.num)];

  // banner si está cerrado
  const banner=document.getElementById('op-cerrado-banner');
  if(banner){
    banner.innerHTML=cerrado?`<div class="alert alert-warning" style="margin-bottom:1rem"><i class="ti ti-lock"></i> <strong>Turno cerrado</strong> — Solo lectura. El turno ${T.nombre} ${planillaStr(T.num)} fue cerrado${c?' por '+c.user+' a las '+c.hora:''}.  </div>`:'';
  }

  if(cerrado){
    el.innerHTML=`<div class="cierre-box" style="border-color:#d1d5db">
      <div style="font-size:15px;font-weight:600;color:#6b7280"><i class="ti ti-lock"></i> Turno cerrado</div>
      <div style="font-size:13px;color:#9ca3af;margin-top:4px">Cerrado${c?' por '+c.user+' a las '+c.hora:''}</div>
    </div>`;
    return;
  }

  // Calcular totales del turno
  const s=getSales(),k=tKey(T.num);
  let totalU=0,totalM=0;
  for(const cat of CATS){
    if(!s[k]?.[cat])continue;
    for(const[pid,qty]of Object.entries(s[k][cat])){
      const p=Object.values(products).flat().find(x=>x.id===pid);
      if(p){totalU+=qty;totalM+=qty*p.precio;}
    }
  }

  el.innerHTML=`<div class="cierre-box">
    <div style="font-size:15px;font-weight:600;color:#27500A;margin-bottom:.5rem"><i class="ti ti-checks"></i> Cerrar turno ${planillaStr(T.num)}</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:1rem">
      ${totalU>0?`Registraste <strong>${totalU} unidades</strong> por un total de <strong>$${totalM.toLocaleString('es-AR')}</strong>.`:'No registraste ventas en este turno.'}
    </div>
    <button class="btn btn-green" onclick="confirmarCierre()"><i class="ti ti-lock"></i> Cerrar y enviar a Franco</button>
  </div>`;
}

function confirmarCierre(){
  const s=getSales(),k=tKey(T.num);
  let totalU=0,totalM=0,detalle=[];
  for(const cat of CATS){
    if(!s[k]?.[cat])continue;
    for(const[pid,qty]of Object.entries(s[k][cat])){
      const p=Object.values(products).flat().find(x=>x.id===pid);
      if(p){totalU+=qty;totalM+=qty*p.precio;detalle.push(`${p.nombre}: ${qty}`);}
    }
  }
  const modal=document.getElementById('modal');
  modal.innerHTML=`<div class="modal-overlay">
    <div class="modal">
      <h2><i class="ti ti-lock"></i> ¿Cerrar turno?</h2>
      <p>Planilla <strong>${planillaStr(T.num)}</strong> · Turno <strong>${T.nombre}</strong> · ${T.fecha}<br><br>
      <strong>${totalU} unidades vendidas</strong><br>Total: <strong>$${totalM.toLocaleString('es-AR')}</strong><br><br>
      Una vez cerrado no podés agregar más ventas a este turno.</p>
      <div class="btns">
        <button class="btn" onclick="document.getElementById('modal').innerHTML=''">Cancelar</button>
        <button class="btn btn-green" onclick="ejecutarCierre(${totalU},${totalM})"><i class="ti ti-check"></i> Confirmar cierre</button>
      </div>
    </div>
  </div>`;
}

function ejecutarCierre(totalU,totalM){
  const ahora=new Date();
  const hora=ahora.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  const c=getCierres();
  c[tKey(T.num)]={user:currentUser.name,hora,fecha:T.fecha,planilla:T.num,totalU,totalM};
  saveCierres(c);
  document.getElementById('modal').innerHTML='';
  toast('✓ Turno cerrado correctamente','success');
  renderOpTable(); renderCierre();
}

// ADMIN
function initAdm(){
  document.getElementById('adm-badge-turno').textContent='Turno '+T.nombre;
  document.getElementById('adm-badge-turno').className='badge badge-'+T.nombre;
  document.getElementById('adm-fecha').textContent=T.fecha;
  document.getElementById('adm-num').textContent='Planilla '+planillaStr(T.num);
  document.getElementById('adm-user-badge').textContent=currentUser.name;
  renderAdmContent();
}
function showAdm(name,btn){
  admSection=name;
  document.querySelectorAll('#screen-admin .tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderAdmContent();
}
function renderAdmContent(){
  const el=document.getElementById('adm-content');if(!el)return;
  if(admSection==='resumen') el.innerHTML=renderResumen();
  else if(admSection==='turnos') el.innerHTML=renderTurnos();
  else if(admSection==='stock') el.innerHTML=renderStock();
  else el.innerHTML=renderUsuarios();
}

function renderResumen(){
  const cat=CATS[admCat];
  const rows=(products[cat]||[]).filter(p=>p.nombre).map(p=>{
    const v=getSalesDay(cat,p.id,T.fechaKey);
    return{...p,ventas:v,monto:v*p.precio,sf:p.stockInicial-v};
  });
  const totU=rows.reduce((a,r)=>a+r.ventas,0);
  const totM=rows.reduce((a,r)=>a+r.monto,0);
  const totP=rows.filter(r=>r.ventas>0).length;
  const keys=dayKeys(T.fechaKey);
  const porTurno=TURNOS.map((nom,i)=>{
    const k=keys[i]||''; const s=getSales();let m=0,u=0;
    if(s[k]?.[cat])for(const[pid,q]of Object.entries(s[k][cat])){const p=(products[cat]||[]).find(x=>x.id===pid);if(p){m+=q*p.precio;u+=q;}}
    const numPlan=k?parseInt(k.replace('T','')):null;
    const cerrado=numPlan?isTurnoCerrado(numPlan):false;
    const cierreInfo=numPlan?getCierres()[tKey(numPlan)]:null;
    return{nom,m,u,cerrado,cierreInfo,numPlan};
  });
  return`
  <div class="metrics">
    <div class="metric"><div class="metric-val">${totU}</div><div class="metric-lbl">Unidades vendidas hoy</div></div>
    <div class="metric"><div class="metric-val">$${totM.toLocaleString('es-AR')}</div><div class="metric-lbl">Monto cobrado hoy</div></div>
    <div class="metric"><div class="metric-val">${totP}</div><div class="metric-lbl">Productos movidos</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem">
    ${porTurno.map(t=>`<div class="metric">
      <div style="margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:6px">
        <span class="badge badge-${t.nom}">${t.nom}</span>
        ${t.cerrado?`<span class="badge badge-cerrado"><i class="ti ti-lock" style="font-size:10px"></i> cerrado</span>`:''}
      </div>
      <div class="metric-val" style="font-size:16px">$${t.m.toLocaleString('es-AR')}</div>
      ${t.cierreInfo?`<div style="font-size:11px;color:#6b7280;margin-top:2px">${t.cierreInfo.user} · ${t.cierreInfo.hora}</div>`:''}
    </div>`).join('')}
  </div>
  <div class="tab-bar">${CATS.map((c,i)=>`<button class="tab ${i===admCat?'active':''}" onclick="admCat=${i};renderAdmContent()">${c}</button>`).join('')}</div>
  <div class="table-wrap"><table>
    <thead><tr><th>Producto</th><th>Precio</th><th>Stock ini.</th><th class="col-venta">Ventas del día</th><th>Stock final</th><th>Monto</th></tr></thead>
    <tbody>${rows.map(r=>`<tr style="${r.ventas>0?'font-weight:500':''}">
      <td>${r.nombre}</td>
      <td>$${r.precio.toLocaleString('es-AR')}</td>
      <td>${r.stockInicial}</td>
      <td class="col-venta" style="text-align:center">${r.ventas>0?`<span class="badge badge-ok">${r.ventas}</span>`:'—'}</td>
      <td class="${r.sf<=0?'stock-out':''}">${r.sf}</td>
      <td>${r.monto>0?'$'+r.monto.toLocaleString('es-AR'):'—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderTurnos(){
  const c=getCierres();
  const items=Object.entries(c).sort((a,b)=>b[1].planilla-a[1].planilla);
  if(!items.length)return`<div class="alert alert-info"><i class="ti ti-info-circle"></i> Aún no hay turnos cerrados.</div>`;
  return`<div class="card">
    <div class="section-title"><i class="ti ti-clock"></i> Turnos cerrados</div>
    <table><thead><tr><th>Planilla</th><th>Fecha</th><th>Cerrado por</th><th>Hora</th><th>Unidades</th><th>Total</th></tr></thead>
    <tbody>${items.map(([k,v])=>`<tr>
      <td><strong>${planillaStr(v.planilla)}</strong></td>
      <td>${v.fecha}</td>
      <td>${v.user}</td>
      <td>${v.hora}</td>
      <td>${v.totalU}</td>
      <td>$${v.totalM.toLocaleString('es-AR')}</td>
    </tr>`).join('')}</tbody></table>
  </div>`;
}

function renderStock(){
  const total=Object.values(products).reduce((a,v)=>a+v.length,0);
  return`<div class="card">
    <div class="section-title"><i class="ti ti-refresh"></i> Recargar desde Google Sheets</div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:1rem">Trae precios y stock inicial actualizados.</p>
    <button class="btn btn-primary" onclick="loadAllSheets()"><i class="ti ti-refresh"></i> Recargar ahora</button>
    ${sheetsLoaded?`<div class="alert alert-success" style="margin-top:1rem"><i class="ti ti-check"></i> ${total} productos cargados.</div>`:''}
  </div>
  <div class="card">
    <div class="section-title"><i class="ti ti-external-link"></i> Editar en Google Sheets</div>
    <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" class="btn"><i class="ti ti-table"></i> Abrir Google Sheets</a>
  </div>`;
}

function renderUsuarios(){
  return`<div class="card">
    <div class="section-title"><i class="ti ti-users"></i> Usuarios</div>
    <table><thead><tr><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Contraseña</th></tr></thead>
    <tbody>${USERS.map(u=>`<tr><td><strong>${u.name}</strong></td><td><code>${u.id}</code></td><td><span class="badge badge-${u.role==='admin'?'admin':'operador'}">${u.role}</span></td><td><code>${u.pass}</code></td></tr>`).join('')}</tbody>
    </table>
  </div>`;
}

let toastTimer;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=type;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
</body>
